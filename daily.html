<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>F.Lovliet · 个人空间</title>
  <style>
    :root {
      --bg: transparent;
      --card-bg: rgba(245, 252, 245, 0.88);
      --text-primary: #1a3a1a;
      --text-secondary: #2d5a2d;
      --text-muted: #5a7a5a;
      --link-green: #2d8a4e;
      --border-color: rgba(45, 138, 78, 0.15);
      --shadow-soft: 0 20px 35px rgba(20, 60, 30, 0.18), 0 5px 15px rgba(20, 60, 30, 0.1);
      --shadow-float: 0 25px 40px -12px rgba(20, 60, 30, 0.25), 0 8px 20px -6px rgba(20, 60, 30, 0.15);
      --radius-card: 20px;
      --max-width: 500px;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
        'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-stack);
      background: linear-gradient(135deg, #0a1a0f 0%, #0d2215 50%, #081510 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 55px;
      background: rgba(10, 25, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(80, 180, 100, 0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 100;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.4);
    }

    .nav-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #a0ffc0, #60d090);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(30, 60, 40, 0.7);
      border: 1px solid rgba(80, 200, 120, 0.5);
      border-radius: 25px;
      color: #a0ffc0;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(40, 180, 80, 0.3);
    }

    .back-btn:hover {
      background: rgba(40, 80, 50, 0.9);
      border-color: rgba(100, 220, 140, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 5px 25px rgba(60, 200, 100, 0.5);
    }

    .back-btn::before {
      content: '←';
      font-size: 1rem;
    }

    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      filter: blur(0.5px);
    }

    .app-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: var(--max-width);
      margin: 75px auto 20px;
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    .content-layer {
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
      border-radius: 24px;
      overflow: visible;
    }

    .card-panel {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-float);
      border: 1px solid rgba(80, 180, 100, 0.25);
      margin-bottom: 18px;
      transform-style: preserve-3d;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: cardFloat 4s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-3px) rotate(0.3deg); }
      50% { transform: translateY(-5px) rotate(0deg); }
      75% { transform: translateY(-3px) rotate(-0.3deg); }
    }

    .card-panel::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, 
        rgba(80, 200, 100, 0), 
        rgba(100, 220, 130, 0.3), 
        rgba(80, 200, 100, 0),
        rgba(120, 240, 150, 0.2),
        rgba(80, 200, 100, 0)
      );
      background-size: 400% 400%;
      border-radius: calc(var(--radius-card) + 2px);
      z-index: -1;
      animation: borderGlow 3s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card-panel:hover::after {
      opacity: 1;
    }

    @keyframes borderGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .card-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(100, 200, 120, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(80, 180, 100, 0.06) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .card-panel:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 
        0 35px 55px -15px rgba(20, 60, 30, 0.35), 
        0 12px 25px -10px rgba(20, 60, 30, 0.25),
        0 0 40px rgba(80, 200, 100, 0.25),
        0 0 80px rgba(80, 200, 100, 0.1);
      border-color: rgba(100, 220, 140, 0.5);
      animation-play-state: paused;
    }

    .cover-card {
      height: 280px;
      overflow: hidden;
      border-radius: var(--radius-card);
      margin-bottom: 18px;
      position: relative;
    }
    .cover-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .cover-card:hover .cover-image {
      transform: scale(1.03);
    }
    .cover-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(10, 30, 15, 0.9), transparent);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 20px;
    }
    .cover-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .cover-nickname {
      font-size: 20px;
      font-weight: 700;
      color: #e0ffe0;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .cover-signature {
      font-size: 13px;
      color: rgba(200, 240, 200, 0.85);
      letter-spacing: 0.3px;
    }
    .cover-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(100, 200, 130, 0.7);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 25px rgba(80, 180, 100, 0.3);
      transition: transform 0.3s ease;
      background: #d0e8d0;
    }
    .cover-avatar:hover {
      transform: scale(1.08) rotate(5deg);
    }

    .moment-card {
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      background: rgba(242, 252, 244, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(80, 180, 100, 0.22);
      animation: floatIn 0.5s ease forwards;
      opacity: 0;
      position: relative;
    }

    .moment-card:nth-child(odd) {
      transform: translateZ(10px) translateX(-8px) rotateY(2deg);
    }
    .moment-card:nth-child(even) {
      transform: translateZ(5px) translateX(8px) rotateY(-2deg);
      flex-direction: row-reverse;
    }
    .moment-card:nth-child(odd) .moment-body {
      text-align: left;
    }
    .moment-card:nth-child(even) .moment-body {
      text-align: right;
    }
    .moment-card:nth-child(even) .moment-text,
    .moment-card:nth-child(even) .moment-meta,
    .moment-card:nth-child(even) .moment-images {
      margin-left: auto;
    }
    .moment-card:nth-child(even) .toggle-text-btn {
      display: inline-block;
    }

    .moment-card:nth-child(1) { animation-delay: 0.05s; }
    .moment-card:nth-child(2) { animation-delay: 0.15s; }
    .moment-card:nth-child(3) { animation-delay: 0.25s; }
    .moment-card:nth-child(4) { animation-delay: 0.35s; }
    .moment-card:nth-child(5) { animation-delay: 0.45s; }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateZ(30px) translateY(20px) scale(0.95); }
      100% { opacity: 1; }
    }

    .moment-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(100, 200, 130, 0.5);
      box-shadow: 0 4px 10px rgba(20, 60, 30, 0.15);
      transition: transform 0.2s ease;
      background: #c8dcc8;
    }
    .moment-avatar:hover {
      transform: scale(1.1);
    }
    .moment-body {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }
    .moment-username {
      font-size: 15px;
      font-weight: 650;
      color: var(--link-green);
      margin-bottom: 4px;
      display: inline-block;
      letter-spacing: 0.2px;
      cursor: pointer;
    }
    .moment-username:hover {
      opacity: 0.8;
    }
    .moment-text {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.6;
      word-break: break-word;
      margin-bottom: 10px;
      position: relative;
    }
    .moment-text.collapsed {
      max-height: 130px;
      overflow: hidden;
    }
    .moment-text.collapsed::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: linear-gradient(to top, rgba(242, 252, 244, 0.95), transparent);
      pointer-events: none;
    }
    .moment-text.expanded {
      max-height: none;
    }
    .toggle-text-btn {
      color: var(--link-green);
      font-size: 13px;
      cursor: pointer;
      display: inline-block;
      margin-bottom: 8px;
      user-select: none;
      font-weight: 500;
    }
    .toggle-text-btn:hover {
      text-decoration: underline;
    }

    .moment-images {
      display: grid;
      gap: 4px;
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      max-width: 320px;
    }
    .moment-images.cols-1 { grid-template-columns: 1fr; max-width: 230px; }
    .moment-images.cols-2 { grid-template-columns: repeat(2, 1fr); max-width: 260px; }
    .moment-images.cols-3 { grid-template-columns: repeat(3, 1fr); max-width: 300px; }
    .moment-images .img-cell {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      cursor: pointer;
      display: block;
      background: #d8e8d8;
      transition: transform 0.2s ease, filter 0.2s;
      border-radius: 6px;
      border: 1px solid rgba(80, 180, 100, 0.15);
    }
    .moment-images.cols-1 .img-cell {
      aspect-ratio: 4/3;
      max-height: 190px;
    }
    .img-cell:hover {
      transform: scale(1.04);
      filter: brightness(0.95);
      z-index: 1;
      position: relative;
    }

    .moment-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-muted);
    }
    .moment-location {
      color: var(--link-green);
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }
    .moment-location svg {
      width: 13px;
      height: 13px;
    }

    .lightbox-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 30, 15, 0.95);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.2s ease;
      padding: 30px;
    }
    .lightbox-overlay img {
      max-width: 92%;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(80, 180, 100, 0.15);
      cursor: default;
    }
    .close-hint {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(150, 220, 160, 0.7);
      font-size: 13px;
      pointer-events: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .toast {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 60, 35, 0.9);
      backdrop-filter: blur(10px);
      color: #d0f0d0;
      padding: 10px 26px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 10000;
      pointer-events: none;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
      letter-spacing: 0.4px;
      border: 1px solid rgba(100, 200, 130, 0.3);
      box-shadow: 0 5px 20px rgba(20, 60, 30, 0.3);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; transform: translateX(-50%) translateY(-15px); }
    }

    @media (max-width: 520px) {
      .cover-card { height: 240px; }
      .cover-avatar { width: 60px; height: 60px; }
      .cover-nickname { font-size: 18px; }
      .moment-card { padding: 14px 16px; gap: 10px; }
      .moment-card:nth-child(odd) { transform: translateZ(8px) translateX(-5px) rotateY(1deg); }
      .moment-card:nth-child(even) { transform: translateZ(4px) translateX(5px) rotateY(-1deg); }
      .navbar { padding: 0 1rem; }
    }
  </style>
</head>

<script>
  (() => {
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    const PARTICLE_COUNT = 80;
    const COLORS = ['rgba(80, 200, 100, 0.7)','rgba(100, 180, 80, 0.65)','rgba(60, 160, 90, 0.6)'];

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random()*width; this.y = Math.random()*height;
        this.vx = (Math.random()-0.5)*0.4; this.vy = (Math.random()-0.5)*0.4-0.1;
        this.radius = Math.random()*2+1;
        this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
        this.alpha = Math.random()*0.4+0.2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if(this.x < -10) this.x = width+10;
        if(this.x > width+10) this.x = -10;
        if(this.y < -10) this.y = height+10;
        if(this.y > height+10) this.y = -10;
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }

    for(let i=0;i<PARTICLE_COUNT;i++) particles.push(new Particle());
    function drawConnections(){}
    function animate() {
      ctx.clearRect(0,0,width,height);
      particles.forEach(p=>{p.update();p.draw(ctx);});
      requestAnimationFrame(animate);
    }
    animate();

    const now = Date.now();
    const momentsData = [
      {id:1,text:'今天搭建好了自己的网站，逃了一周的课终于是做完了，累死我了！',images:[],location:'河南·许昌',timestamp:new Date('2026-05-16').getTime()},
      {id:2,text:'今天参加的河南省ICPC省赛演习，用豆包做对了所有题目，拿到了8个气球，还有个同学给了我一个气球，一共9个，很开心，哈哈哈hhh全偷走咯，很遗憾不能参加省赛ICPC。',images:['qiqiu1.jpg','qiqiu2.jpg','qiqiu3.jpg'],location:'河南·许昌',timestamp:new Date('2026-05-16').getTime()},
      {id:3,text:'学了个P图就这样带着我的小家伙们来上课和理发。理的头发好难看，被人笑话了',images:['xiaojiahuo1.jpg','xiaojiahuo2.png'],location:'河南·许昌',timestamp:new Date('2026-05-10').getTime()},
      {id:4,text:'今天参加了许昌学院ICPC，我以为这是ICPC省赛的选拔赛，没想到被“骗”了。拿到了二等奖，二等奖的奖品居然是罗技G304鼠标，听同学说这鼠标很好，信工院老师也太大方了!',images:['g304.jpg','erdengjiang.jpg','shubiao.jpg'],location:'河南·许昌',timestamp:new Date('2026-05-05').getTime()},
      {id:5,text:'蓝桥杯居然拿到了省一，看到省一的一瞬间我激动坏了，很开心，也很感谢路老师给我交的报名费让我参赛，一开始我还不敢参加，是老师鼓励我参赛的，努力备战国赛了',images:['huojiang.jpg','xiangqing.jpg'],location:'河南·许昌',timestamp:new Date('2026-04-27').getTime()},
    ];

    function getRelativeTime(t){
      const diff=Date.now()-t;
      const m=Math.floor(diff/6e4),h=Math.floor(diff/36e5),d=Math.floor(diff/864e5);
      if(m<1)return'刚刚';if(m<60)return m+'分钟前';if(h<24)return h+'小时前';if(d===1)return'昨天';if(d<7)return d+'天前';
      const dt=new Date(t);return dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日';
    }

    function getGridClass(c){
      if(c===1)return'cols-1';if(c===2)return'cols-2';if(c<=3)return'cols-3';if(c<=4)return'cols-2';return'cols-3';
    }

    const container=document.getElementById('momentsContainer');
    function renderMoment(d){
      const c=document.createElement('div');c.className='card-panel moment-card';
      const cnt=d.images.length;const grid=getGridClass(cnt);const long=d.text.length>120;
      let imgs='';
      if(cnt>0){
        const show=d.images.slice(0,9);
        imgs=`<div class="moment-images ${grid}">${show.map((s,i)=>`<img class="img-cell" src="${s}" alt="图" loading="lazy">`).join('')}</div>`;
      }
      const loc=d.location?`<span class="moment-location"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${d.location}</span>`:'';
      const btn=long?'<span class="toggle-text-btn" data-action="expand">全文</span>':'';
      c.innerHTML=`
        <img class="moment-avatar" src="shilaimu.jpg" alt="头像" onerror="this.style.display='none';">
        <div class="moment-body">
          <span class="moment-username">F.Lovliet</span>
          <div class="moment-text ${long?'collapsed':''}">${d.text}</div>
          ${btn}${imgs}
          <div class="moment-meta"><span>${getRelativeTime(d.timestamp)}</span>${loc}</div>
        </div>
      `;
      return c;
    }

    momentsData.forEach(d=>container.appendChild(renderMoment(d)));

    container.addEventListener('click',e=>{
      const t=e.target;
      if(t.classList.contains('img-cell')){openLightbox(t.src);return;}
      if(t.classList.contains('toggle-text-btn')){
        const txt=t.parentElement.querySelector('.moment-text');
        if(t.dataset.action==='expand'){txt.classList.remove('collapsed');t.textContent='收起';t.dataset.action='collapse';}
        else{txt.classList.add('collapsed');t.textContent='全文';t.dataset.action='expand';}
      }
    });

    const lb=document.getElementById('lightbox');const lbi=document.getElementById('lightboxImg');
    function openLightbox(s){lbi.src=s;lb.style.display='flex';document.body.style.overflow='hidden';}
    function close(){lb.style.display='none';lbi.src='';document.body.style.overflow='';}
    lb.addEventListener('click',e=>e.target===lb&&close());
    document.addEventListener('keydown',e=>e.key==='Escape'&&close());

    function toast(m){
      const old=document.querySelector('.toast');old&&old.remove();
      const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);
      setTimeout(()=>t.remove(),2000);
    }
    document.querySelector('.cover-avatar').onclick=()=>toast('🌿个人主页');
  })();
</script>
</body>
</html>
